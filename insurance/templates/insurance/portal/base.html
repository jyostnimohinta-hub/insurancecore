<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Customer Portal — InsureCore{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
--green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
--amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
--red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
--border:#e5e7eb;--bg:#f7f8fa;--text:#111827;--text-2:#374151;
--text-3:#6b7280;--text-4:#9ca3af;--white:#fff;
--sans:'Plus Jakarta Sans',sans-serif;--radius:8px;--radius-lg:12px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh}
.main{margin-left:220px;flex:1}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}
.content{padding:24px}
.sidebar-brand{padding:18px 20px;border-bottom:1px solid var(--border)}
.brand-name{font-size:16px;font-weight:700}
.brand-sub{font-size:10px;color:var(--text-4);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{padding:12px;flex:1}
.nav-label{font-size:10px;font-weight:600;color:var(--text-4);letter-spacing:1px;text-transform:uppercase;padding:8px 10px 4px;margin-top:8px}
.nav-link{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);color:var(--text-3);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:2px;transition:all .15s}
.nav-link:hover,.nav-link.active{background:var(--blue-bg);color:var(--blue)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.logout-link{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);color:var(--red);text-decoration:none;font-size:13px;font-weight:500}
.logout-link:hover{background:var(--red-bg)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600}
.card-body{padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.kpi-label{font-size:12px;color:var(--text-3);margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-1px}
.kpi.blue .kpi-value{color:var(--blue)}
.kpi.green .kpi-value{color:var(--green)}
.kpi.amber .kpi-value{color:var(--amber)}
.kpi.red .kpi-value{color:var(--red)}
table.data{width:100%;border-collapse:collapse}
table.data th{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg)}
table.data td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px}
table.data tr:last-child td{border-bottom:none}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid transparent}
.badge-pending{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.badge-active{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.badge-approved{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.badge-settled{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.badge-rejected{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.badge-under_review{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.badge-paid{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.badge-expired{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.badge-cancelled{background:var(--bg);color:var(--text-3);border-color:var(--border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;text-decoration:none;border:1px solid transparent}
.btn-primary{background:var(--blue);color:white}
.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:5px 10px;font-size:12px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;text-transform:uppercase}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;border:1px solid transparent}
.alert-success{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.alert-error{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.alert-warning{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.page-title{font-size:16px;font-weight:600}
.portal-tag{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.detail-row{display:flex;gap:4px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:12px;color:var(--text-3);width:140px;flex-shrink:0;font-weight:500;padding-top:1px}
.detail-value{font-size:13.5px;color:var(--text);font-weight:500}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sidebar-brand">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;flex-shrink:0">🛡</div>
      <div>
        <div class="brand-name">InsureCore</div>
        <div class="brand-sub">Customer Portal</div>
      </div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Overview</div>
    <a href="{% url 'customer_portal_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'customer_portal_dashboard' %}active{% endif %}">📊 Dashboard</a>
    <a href="{% url 'customer_browse_plans' %}" class="nav-link {% if 'plan' in request.resolver_match.url_name %}active{% endif %}">🛒 Browse Plans</a>

    <div class="nav-label">My Insurance</div>
    <a href="{% url 'customer_portal_policies' %}" class="nav-link {% if request.resolver_match.url_name == 'customer_portal_policies' %}active{% endif %}">📄 My Policies</a>
    <a href="{% url 'customer_portal_claims' %}" class="nav-link {% if request.resolver_match.url_name == 'customer_portal_claims' %}active{% endif %}">📋 My Claims</a>
    <a href="{% url 'customer_portal_claim_submit' %}" class="nav-link {% if request.resolver_match.url_name == 'customer_portal_claim_submit' %}active{% endif %}">➕ Submit Claim</a>
    <a href="{% url 'customer_portal_payments' %}" class="nav-link {% if request.resolver_match.url_name == 'customer_portal_payments' %}active{% endif %}">💳 My Payments</a>

    <div class="nav-label">Account</div>
    <a href="{% url 'customer_portal_profile' %}" class="nav-link {% if request.resolver_match.url_name == 'customer_portal_profile' %}active{% endif %}">👤 My Profile</a>
  </nav>
  <div class="sidebar-footer">
    <a href="{% url 'customer_logout' %}" class="logout-link">🚪 Sign Out</a>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <span class="page-title">{% block page_title %}Dashboard{% endblock %}</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="portal-tag">Customer Portal</span>
      <span style="font-size:12px;color:var(--text-3)">{{ request.user.username }}</span>
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</main>
</div>
</body>
</html>
